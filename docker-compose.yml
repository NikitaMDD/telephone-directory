services:
  db:
    image: postgres:16-alpine
    container_name: telephone-db

    restart: unless-stopped

    env_file:
      - .env

    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    ports:
      - "${POSTGRES_PORT}:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - telephone-network

  backend:
    container_name: telephone-backend

    build:
      context: ./backend

    restart: unless-stopped

    env_file:
      - ./backend/.env

    volumes:
      - ./backend:/app
      - /app/node_modules

    depends_on:
      db:
        condition: service_healthy

    ports:
      - "${BACKEND_PORT}:3000"

    networks:
      - telephone-network

  frontend:
    container_name: telephone-frontend

    build:
      context: ./frontend

    restart: unless-stopped

    env_file:
      - .env

    volumes:
      - ./frontend:/app
      - /app/node_modules

    depends_on:
      - backend

    ports:
      - "${FRONTEND_PORT}:5173"

    networks:
      - telephone-network

  nginx:
    container_name: telephone-nginx

    build:
      context: ./nginx

    restart: unless-stopped

    depends_on:
      - frontend
      - backend

    ports:
      - "${NGINX_PORT}:80"

    networks:
      - telephone-network

volumes:
  postgres_data:

networks:
  telephone-network:
    driver: bridge